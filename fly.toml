app            = "airtable-figma-automation"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app = "python -m airtable_to_figma.poller"

[[services]]
  processes = ["app"]
  auto_stop_machines = false
  min_machines_running = 1
