        field_mapping_overrides:
          "Speaker 2": "Speaker name 2"
          "Tagline (from Speakers) 2": "Job 2"
        image_field_mapping_overrides:
          "Pic speaker 2": "Photo2"
        variants:
          sponsored:
            figma_file_key:      "RTwPDkPRacTJLbO1fz5ruk"
            figma_frame_node_id: "141-871"
          sponsored_two_speakers:
            figma_file_key:      "RTwPDkPRacTJLbO1fz5ruk"
            figma_frame_node_id: "141-992"
          two_speakers:
