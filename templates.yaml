# templates.yaml
# ──────────────
# Define one entry per design workflow.
# This file is safe to commit — no API keys or secrets here.
# API keys live in .env only.

templates:

  # ── PlatformCon Talk Assets ──────────────────────────────────────────────
  #
  # In Airtable, add:
  #   • "Generate"          — Multi-select with options:
  #                           OpenGraph, LinkedIn Social, Speaker Social
  #   • "Ready for Design"  — Checkbox (trigger)
  #   • "Session open graph" / "LinkedIn Social" / "Speaker Social Card"
  #                         — Attachment fields (one per output)
  #
  # The team picks which images they want from the "Generate" multi-select,
  # then checks "Ready for Design". Only the selected outputs are generated.
  # Leave selection_field blank to always generate all outputs.

  - name: "PlatformCon Talk Assets"

    airtable_base_id:       "appWCcWlFJyl24qil"
    airtable_table_name:    "Sessions"
    erase_placeholders:     false   # text layers in Figma set to 0% opacity

    # Single-select trigger — fires when field equals trigger_value.
    # Use airtable_trigger_value for single-select fields (like a status column).
    # Leave airtable_trigger_value blank to use a checkbox field instead.
    airtable_trigger_field:       "Design status"
    airtable_trigger_pending_value: "Pending"
    airtable_trigger_working_value: "Working"
    airtable_trigger_value:       "Push to design"
    airtable_trigger_reset_value: "Ready for publication"   # set after generation

    # Airtable multi-select field that controls which outputs to run.
    # Values must match the selection_value of each output exactly.
    selection_field: "Generate"

    remove_background: true

    # Font map — Figma font family name → file in the fonts/ directory.
    # To find the exact name: in Figma, click a text layer → inspect the font
    # name shown in the right panel (e.g. "Space Grotesk Bold").
    # Drop the TTF/OTF file into the fonts/ folder and reference it here.
    font_map:
      "Space Grotesk Bold":    "SpaceGrotesk-Bold.ttf"
      "Space Grotesk":         "SpaceGrotesk-Regular.ttf"
      "Space Grotesk Medium":  "SpaceGrotesk-Medium.ttf"

    # Shared mappings — layer names must exist in ALL output frames
    field_mappings:
      "Talk Title":     "Title"
      "Speaker 1":    "Speaker name"
      "Tagline (from Speakers)": "Job"
      "Date" : "Date"

    image_field_mappings:
       "Pic speaker 1": "Photo1"

    outputs:
      - name: "Session Open Graph"
        selection_value:       "Opengraph"
        attachment_field:      "Session Open Graph"
        figma_file_key:        "RTwPDkPRacTJLbO1fz5ruk"
        figma_frame_node_id:   "7-622"
        figma_export_scale:    2.0
        boolean_variant_field: "Is Sponsored"
        boolean_variant_name:  "sponsored"
        auto_variant_on_field: "Pic speaker 2"
        auto_variant_name:     "two_speakers"
        field_mapping_overrides:
          "Speaker 2": "Speaker name 2"
          "Tagline (from Speakers) 2": "Job 2"
        image_field_mapping_overrides:
          "Pic speaker 2": "Photo2"
        variants:
          sponsored:
            figma_file_key:      "RTwPDkPRacTJLbO1fz5ruk"
            figma_frame_node_id: "141-871"
          sponsored_two_speakers:
            figma_file_key:      "RTwPDkPRacTJLbO1fz5ruk"
            figma_frame_node_id: "141-992"
          two_speakers:
            figma_file_key:      "RTwPDkPRacTJLbO1fz5ruk"
            figma_frame_node_id: "41-602"

