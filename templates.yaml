pdf_reports:

  - name: "Sponsor Report"

    airtable_base_id:    "appWCcWlFJyl24qil"
    airtable_table_name: "Sponsor Recap - PlatformCon 2026"

    # Single-select trigger — set this field to "Generate" to kick off a report.
    airtable_trigger_field:       "Generate Report"
    airtable_trigger_value:       "Generate"
    airtable_trigger_reset_value: "Done"

    # Airtable attachment field where the final PDF is uploaded.
    attachment_field: "Sponsor Report PDF"

    # Figma file containing all 10 report frames.
    figma_file_key: "2l8icaQqVfYBuSIjWYZ98s"

    # Sponsor logo: pulled from this Airtable attachment field and composited
    # onto the "Logo" placeholder frame in every sponsor-specific page.
    logo_attachment_field: "Logo"
    logo_layer_name:        "Logo"

    font_map:
      "Space Grotesk Bold":   "SpaceGrotesk-Bold.ttf"
      "Space Grotesk":        "SpaceGrotesk-Regular.ttf"
      "Space Grotesk Medium": "SpaceGrotesk-Medium.ttf"

    # Pages 1, 3, 4 are always included first, exported as-is (no data overlay).
    static_page_ids:
      - "6:695"   # page 1 — overall overview
      - "6:3936"  # page 3 — Live Day LDN summary
      - "6:1229"  # page 4 — Live Day NYC summary

    # Page 29 is always appended as the last page of every report.
    closing_page_id: "43:1397"

    # Named field groups — a group is "active" if ANY field in it has a value.
    field_groups:
      virtual:
        - "Workshop registrations"
        - "Workshop attendees"
        - "Workshop view minutes"
      ldn_live:
        - "LDN Booth leads scanned copy"
        - "LDN pre-event workshop registrations"
        - "LDN workshop attendees"
      nyc_live:
        - "NYC Booth leads scanned"
        - "NYC pre-evnt workshop registrations"
        - "NYC workshop attendees"
      ldn_workshop:
        - "LDN pre-event workshop registrations"
        - "LDN workshop attendees"
      nyc_workshop:
        - "NYC pre-evnt workshop registrations"
        - "NYC workshop attendees"
      any_workshop:
        - "LDN pre-event workshop registrations"
        - "LDN workshop attendees"
        - "NYC pre-evnt workshop registrations"
        - "NYC workshop attendees"
      ldn_rt:
        - "LDN Roundtable registrations"
        - "LDN Roundtable attendees"
      nyc_rt:
        - "NYC Roundtable registrations"
        - "NYC Roundtable attendees"

    # Combo pages — each page is included when all `require` groups are active
    # and all `exclude` groups are inactive. Evaluated in order.
    combo_pages:

      # ── Virtual only ────────────────────────────────────────────────────────
      # Frame 8 — virtual only, no live day data
      - figma_frame_node_id: "7:11088"
        require: [virtual]
        exclude: [ldn_live, nyc_live]
        field_mappings:
          "@":                           "Sponsor label"
          "#Virtual-wr registrations":   "Workshop registrations"
          "#Virtual workshop attendees": "Workshop attendees"
          "#Total view minutes":         "Workshop view minutes"

      # ── Virtual + LDN only (no NYC) ─────────────────────────────────────────
      # Frame 5 — virtual + LDN with workshops
      - figma_frame_node_id: "6:6635"
        require: [virtual, ldn_live, ldn_workshop]
        exclude: [nyc_live]
        field_mappings:
          "@":                            "Sponsor label"
          "#Virtual-wr registrations":    "Workshop registrations"
          "#Virtual workshop attendees":  "Workshop attendees"
          "#Total view minutes":          "Workshop view minutes"
          "#Liveday-wr registrants":      "LDN pre-event workshop registrations"
          "#Live day workshop attendees": "LDN workshop attendees"
          "#Leads scanned at booth":      "LDN Booth leads scanned copy"

      # Frame 30 — virtual + LDN, booth-only (no workshops)
      - figma_frame_node_id: "66:4160"
        require: [virtual, ldn_live]
        exclude: [nyc_live, ldn_workshop]
        field_mappings:
          "@":                            "Sponsor label"
          "#Virtual-wr registrations":    "Workshop registrations"
          "#Virtual workshop attendees":  "Workshop attendees"
          "#Total view minutes":          "Workshop view minutes"
          "#Liveday-wr registrants":      "Avg leads captured Live Day LDN"
          "#Leads scanned at booth":      "LDN Booth leads scanned copy"

      # ── Virtual + NYC only (no LDN) ─────────────────────────────────────────
      # Frame 9 — virtual + NYC with workshops
      - figma_frame_node_id: "7:12294"
        require: [virtual, nyc_live, nyc_workshop]
        exclude: [ldn_live]
        field_mappings:
          "@":                            "Sponsor label"
          "#Virtual-wr registrations":    "Workshop registrations"
          "#Virtual workshop attendees":  "Workshop attendees"
          "#Total view minutes":          "Workshop view minutes"
          "#Liveday-wr registrants":      "NYC pre-evnt workshop registrations"
          "#Live day workshop attendees": "NYC workshop attendees"
          "#Leads scanned at booth":      "NYC Booth leads scanned"

      # Frame 33 — virtual + NYC, booth-only (no workshops)
      - figma_frame_node_id: "67:4730"
        require: [virtual, nyc_live]
        exclude: [ldn_live, nyc_workshop]
        field_mappings:
          "@":                            "Sponsor label"
          "#Virtual-wr registrations":    "Workshop registrations"
          "#Virtual workshop attendees":  "Workshop attendees"
          "#Total view minutes":          "Workshop view minutes"
          "#Liveday-wr registrants":      "Avg leads captured Live Day NYC"
          "#Leads scanned at booth":      "NYC Booth leads scanned"

      # ── All three: virtual + LDN + NYC ──────────────────────────────────────
      # Frame 8 — virtual stats section (always included when all three present)
      - figma_frame_node_id: "7:11088"
        require: [virtual, ldn_live, nyc_live]
        field_mappings:
          "@":                           "Sponsor label"
          "#Virtual-wr registrations":   "Workshop registrations"
          "#Virtual workshop attendees": "Workshop attendees"
          "#Total view minutes":         "Workshop view minutes"

      # Frame 10 — LDN + NYC combined, BOTH locations have workshops
      # [0] = LDN section, [1] = NYC section
      - figma_frame_node_id: "7:13534"
        require: [virtual, ldn_live, nyc_live, ldn_workshop, nyc_workshop]
        field_mappings:
          "@":                               "Sponsor label"
          "#Liveday-wr registrants[0]":      "LDN pre-event workshop registrations"
          "#Live day workshop attendees[0]": "LDN workshop attendees"
          "#Leads scanned at booth[0]":      "LDN Booth leads scanned copy"
          "#Liveday-wr registrants[1]":      "NYC pre-evnt workshop registrations"
          "#Live day workshop attendees[1]": "NYC workshop attendees"
          "#Leads scanned at booth[1]":      "NYC Booth leads scanned"

      # Frame 35 — LDN booth-only, NYC with workshops
      # [0] = LDN section (2-stat booth), [1] = NYC section (3-stat workshop)
      # #Live day workshop attendees has no duplicate — only in NYC section, no index needed
      - figma_frame_node_id: "69:5373"
        require: [virtual, ldn_live, nyc_live, nyc_workshop]
        exclude: [ldn_workshop]
        field_mappings:
          "@":                              "Sponsor label"
          "#Liveday-wr registrants[0]":    "Avg leads captured Live Day LDN"
          "#Leads scanned at booth[0]":    "LDN Booth leads scanned copy"
          "#Liveday-wr registrants[1]":    "NYC pre-evnt workshop registrations"
          "#Live day workshop attendees":  "NYC workshop attendees"
          "#Leads scanned at booth[1]":    "NYC Booth leads scanned"

      # Frame 36 — LDN with workshops, NYC booth-only
      # [0] = LDN section (3-stat workshop), [1] = NYC section (2-stat booth)
      # #Live day workshop attendees has no duplicate — only in LDN section, no index needed
      - figma_frame_node_id: "69:5615"
        require: [virtual, ldn_live, nyc_live, ldn_workshop]
        exclude: [nyc_workshop]
        field_mappings:
          "@":                              "Sponsor label"
          "#Liveday-wr registrants[0]":    "LDN pre-event workshop registrations"
          "#Live day workshop attendees":  "LDN workshop attendees"
          "#Leads scanned at booth[0]":    "LDN Booth leads scanned copy"
          "#Liveday-wr registrants[1]":    "Avg leads captured Live Day NYC"
          "#Leads scanned at booth[1]":    "NYC Booth leads scanned"

      # Frame 34 — LDN + NYC combined, BOTH locations booth-only (no workshops)
      # [0] = LDN section, [1] = NYC section
      - figma_frame_node_id: "67:4863"
        require: [virtual, ldn_live, nyc_live]
        exclude: [any_workshop]
        field_mappings:
          "@":                              "Sponsor label"
          "#Liveday-wr registrants[0]":    "Avg leads captured Live Day LDN"
          "#Leads scanned at booth[0]":    "LDN Booth leads scanned copy"
          "#Liveday-wr registrants[1]":    "Avg leads captured Live Day NYC"
          "#Leads scanned at booth[1]":    "NYC Booth leads scanned"

      # ── LDN only, no virtual ────────────────────────────────────────────────
      # Frame 7 — LDN only with workshops
      - figma_frame_node_id: "7:9671"
        require: [ldn_live, ldn_workshop]
        exclude: [virtual, nyc_live]
        field_mappings:
          "@":                            "Sponsor label"
          "#Liveday-wr registrants":      "LDN pre-event workshop registrations"
          "#Live day workshop attendees": "LDN workshop attendees"
          "#Leads scanned at booth":      "LDN Booth leads scanned copy"

      # Frame 32 — LDN only, booth-only
      - figma_frame_node_id: "66:4539"
        require: [ldn_live]
        exclude: [virtual, nyc_live, ldn_workshop]
        field_mappings:
          "@":                       "Sponsor label"
          "#Liveday-wr registrants": "Avg leads captured Live Day LDN"
          "#Leads scanned at booth": "LDN Booth leads scanned copy"

      # ── NYC only, no virtual ────────────────────────────────────────────────
      # Frame 6 — NYC only with workshops
      - figma_frame_node_id: "7:8417"
        require: [nyc_live, nyc_workshop]
        exclude: [virtual, ldn_live]
        field_mappings:
          "@":                            "Sponsor label"
          "#Liveday-wr registrants":      "NYC pre-evnt workshop registrations"
