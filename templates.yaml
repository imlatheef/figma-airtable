pdf_reports:

  - name: "Sponsor Report"

    airtable_base_id:    "appWCcWlFJyl24qil"
    airtable_table_name: "Sponsor Recap - PlatformCon 2026"

    # Single-select trigger — set this field to "Generate" to kick off a report.
    airtable_trigger_field:       "Generate Report"
    airtable_trigger_value:       "Generate"
    airtable_trigger_reset_value: "Done"

    # Airtable attachment field where the final PDF is uploaded.
    attachment_field: "Sponsor Report PDF"

    # Figma file containing all 10 report frames.
    figma_file_key: "2l8icaQqVfYBuSIjWYZ98s"

    # Multi-select field in Airtable with options: London, NYC, Virtual.
    location_field: "Location"

    # Sponsor logo: pulled from this Airtable attachment field and composited
    # onto the "Logo" placeholder frame in every sponsor-specific page.
    logo_attachment_field: "Logo"
    logo_layer_name:        "Logo"

    font_map:
      "Space Grotesk Bold":   "SpaceGrotesk-Bold.ttf"
      "Space Grotesk":        "SpaceGrotesk-Regular.ttf"
      "Space Grotesk Medium": "SpaceGrotesk-Medium.ttf"

    # Pages 1, 3, 4 are always included first, exported as-is (no data overlay).
    static_page_ids:
      - "6:695"   # page 1 — overall overview
      - "6:3936"  # page 3 — Live Day LDN summary
      - "6:1229"  # page 4 — Live Day NYC summary

    # Page 29 is always appended as the last page of every report.
    closing_page_id: "43:1397"

    # Pages per location — processed in order: Virtual → London → NYC.
    # Each page is included only if its field_presence_fields are non-empty/non-zero.
    # Leave field_presence_fields empty to always include the page.
    location_pages:

      Virtual:
        - figma_frame_node_id: "7:11088"
          field_presence_fields:
            - "REF: Total virtual workshop registrants (from Sponsor)"
            - "REF Total virtual workshop attendees (from Sponsor)"
            - "REF: Total virtual workshop view minutes (from Sponsor)"
          field_mappings:
            "@":                           "Sponsor label"
            "#Virtual-wr registrations":   "REF: Total virtual workshop registrants (from Sponsor)"
            "#Virtual workshop attendees": "REF Total virtual workshop attendees (from Sponsor)"
            "#Total view minutes":         "REF: Total virtual workshop view minutes (from Sponsor)"

      London:
        # Live day page — included if booth, workshop, or attendee data is present
        - figma_frame_node_id: "7:9671"
          field_presence_fields:
            - "LDN Booth leads scanned"
            - "LDN In-person workshop registrations"
            - "LDN In-person workshop attendees"
          field_mappings:
            "@":                            "Sponsor label"
            "#Liveday-wr registrants":      "LDN In-person workshop registrations"
            "#Live day workshop attendees": "LDN In-person workshop attendees"
            "#Leads scanned at booth":      "LDN Booth leads scanned"
        # Roundtable page — included only if roundtable data is present
        - figma_frame_node_id: "28:2072"
          field_presence_fields:
            - "LDN Roundtable registrations"
            - "LDN Roundtable attendees"
          field_mappings:
            "@":                         "Sponsor label"
            "#Liveday-wr registrants":   "LDN Roundtable registrations"
            "#Live day workshop attendees": "LDN Roundtable attendees"

      NYC:
        # Live day page — included if booth, workshop, or attendee data is present
        - figma_frame_node_id: "7:8417"
          field_presence_fields:
            - "NYC Booth leads scanned"
            - "NYC In-person workshop registrations"
            - "NYC In-person workshop attendees"
          field_mappings:
            "@":                            "Sponsor label"
            "#Liveday-wr registrants":      "NYC In-person workshop registrations"
            "#Live day workshop attendees": "NYC In-person workshop attendees"
            "#Leads scanned at booth":      "NYC Booth leads scanned"
        # Roundtable page — included only if roundtable data is present
        - figma_frame_node_id: "32:961"
          field_presence_fields:
            - "NYC Roundtable registrations"
            - "NYC Roundtable attendees"
          field_mappings:
            "@":                         "Sponsor label"
            "#Liveday-wr registrants":   "NYC Roundtable registrations"
            "#Live day workshop attendees": "NYC Roundtable attendees"


# templates.yaml
# ──────────────
# Define one entry per design workflow.
# This file is safe to commit — no API keys or secrets here.
# API keys live in .env only.

templates:

  # ── PlatformCon Talk Assets ──────────────────────────────────────────────
  #
  # In Airtable, add:
  #   • "Generate"          — Multi-select with options:
  #                           OpenGraph, LinkedIn Social, Speaker Social
  #   • "Ready for Design"  — Checkbox (trigger)
  #   • "Session open graph" / "LinkedIn Social" / "Speaker Social Card"
  #                         — Attachment fields (one per output)
  #
  # The team picks which images they want from the "Generate" multi-select,
  # then checks "Ready for Design". Only the selected outputs are generated.
  # Leave selection_field blank to always generate all outputs.

  - name: "PlatformCon Talk Assets"

    airtable_base_id:       "appWCcWlFJyl24qil"
    airtable_table_name:    "Sessions"
    erase_placeholders:     false   # text layers in Figma set to 0% opacity

    # Single-select trigger — fires when field equals trigger_value.
    # Use airtable_trigger_value for single-select fields (like a status column).
    # Leave airtable_trigger_value blank to use a checkbox field instead.
    airtable_trigger_field:       "Design status"
    airtable_trigger_pending_value: "Pending"
    airtable_trigger_working_value: "Working"
    airtable_trigger_value:       "Push to design"
    airtable_trigger_reset_value: "Ready for publication"   # set after generation

    # Airtable multi-select field that controls which outputs to run.
    # Values must match the selection_value of each output exactly.
    selection_field: "Generate"

    remove_background: true

    # Font map — Figma font family name → file in the fonts/ directory.
    # To find the exact name: in Figma, click a text layer → inspect the font
    # name shown in the right panel (e.g. "Space Grotesk Bold").
    # Drop the TTF/OTF file into the fonts/ folder and reference it here.
    font_map:
      "Space Grotesk Bold":    "SpaceGrotesk-Bold.ttf"
      "Space Grotesk":         "SpaceGrotesk-Regular.ttf"
      "Space Grotesk Medium":  "SpaceGrotesk-Medium.ttf"

    # Shared mappings — layer names must exist in ALL output frames
    field_mappings:
      "Talk Title":     "Title"
      "Speaker 1":    "Speaker name"
      "Tagline (from Speakers)": "Job"
      "Date" : "Date"

    image_field_mappings:
       "Pic speaker 1": "Photo1"

    outputs:
      - name: "Session Open Graph"
        selection_value:       "Opengraph"
        attachment_field:      "Session Open Graph"
        figma_file_key:        "RTwPDkPRacTJLbO1fz5ruk"
        figma_frame_node_id:   "7-622"
        figma_export_scale:    2.0
