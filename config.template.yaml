# ─────────────────────────────────────────────────────────────
#  config.template.yaml  –  copy to config.yaml and fill in
#  On Railway: set these as environment variables instead.
# ─────────────────────────────────────────────────────────────

airtable:
  api_key: "YOUR_AIRTABLE_API_KEY"
  base_id: "YOUR_BASE_ID"
  table_name: "All Sessions"
  attachment_field: "Session open graph"
  trigger_field: "Ready for Design"
  imgbb_api_key: "YOUR_IMGBB_API_KEY"

figma:
  api_key: "YOUR_FIGMA_API_KEY"
  file_key: "YOUR_FIGMA_FILE_KEY"
  frame_node_id: "1:2"
  export_scale: 2

server:
  port: 5000
  webhook_secret: ""

field_mappings:
  "Session Title":       "Title"
  "Speaker 1 Name":      "Speaker name"
  "Speaker 1 tagline":   "Job"

image_field_mappings:
  "Speaker 1 picture":   "Photo"

font_overrides:
  Title:
    font_path: "fonts/SpaceGrotesk-Bold.ttf"
  Speaker name:
    font_path: "fonts/SpaceGrotesk-Bold.ttf"
  Job:
    font_path: "fonts/SpaceGrotesk-Regular.ttf"
